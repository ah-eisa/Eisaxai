name: Production Smoke Test

on:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Run smoke tests on production over SSH
        id: smoke
        shell: bash
        run: |
          set +e
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          HOST="ubuntu@141.145.153.23"

          root_code="$(ssh $SSH_OPTS "$HOST" "curl -sk -o /dev/null -w '%{http_code}' https://ai.eisax.com/")"
          login_code="$(ssh $SSH_OPTS "$HOST" "curl -sk -o /dev/null -w '%{http_code}' -X POST https://ai.eisax.com/auth/login -H 'Content-Type: application/json' -d '{\"email\":\"wrong@example.com\",\"password\":\"wrong\"}'")"
          sign_in_count="$(ssh $SSH_OPTS "$HOST" "curl -sk https://ai.eisax.com/login | grep -c 'Sign in'")"

          failed=0
          if [ "$root_code" != "200" ]; then
            failed=1
          fi
          if [ "$login_code" != "401" ]; then
            failed=1
          fi
          if [ "$sign_in_count" != "1" ]; then
            failed=1
          fi

          echo "root_code=$root_code" >> "$GITHUB_OUTPUT"
          echo "login_code=$login_code" >> "$GITHUB_OUTPUT"
          echo "sign_in_count=$sign_in_count" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

      - name: Telegram alert on failure
        if: steps.smoke.outputs.failed == '1'
        shell: bash
        run: |
          msg="EisaX smoke test FAILED on main push.%0ARoot HTTP: ${{ steps.smoke.outputs.root_code }}%0ALogin(wrong creds) HTTP: ${{ steps.smoke.outputs.login_code }}%0A/login Sign in count: ${{ steps.smoke.outputs.sign_in_count }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="933252341" \
            -d text="$msg" > /dev/null

      - name: Mark workflow failed if smoke tests failed
        if: steps.smoke.outputs.failed == '1'
        run: exit 1
